<!DOCTYPE html>
<html>
<head>
    <title>{{ city_name }} PM2.5 Data</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center">{{ city_name }}</h1>

    <p class="text-center">
        Loaded {{ dates|length }} daily PM2.5 values.
    </p>

    <div class="card mt-4">
        <div class="card-body">
            <canvas id="pm25Chart"></canvas>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-secondary">Back to Map</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const dates = {{ dates|safe }};
    const values = {{ values|safe }};

    const ctx = document.getElementById("pm25Chart");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: "Daily PM2.5",
                data: values,
                borderWidth: 1,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            scales: {
                x: {
                    title: {
                        display: true,
                        text: "Date"
                    }
                },
                y: {
                    title: {
                        display: true,
                        text: "PM2.5 Arithmetic Mean"
                    }
                }
            }
        }
    });
</script>

</body>
</html>
